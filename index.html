<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Google Fonts Browser</title>
  <link rel="stylesheet" href="google_fonts.css">
</head>
<body>

  <h1>Google Fonts Browser</h1>
  <p class="subtitle">Click a category to filter</p>

  <div class="filter-bar" id="filter-bar">
    <button class="filter-btn active" data-cat="all">All</button>
    <button class="filter-btn" data-cat="serif">Serif</button>
    <button class="filter-btn" data-cat="sans-serif">Sans-Serif</button>
    <button class="filter-btn" data-cat="monospace">Monospace</button>
    <button class="filter-btn" data-cat="display">Display</button>
    <button class="filter-btn" data-cat="handwriting">Handwriting</button>
  </div>

  <div id="status">Loading fonts...</div>
  <div id="font-container"></div>

  <script src="google_fonts_data.js"></script>

</body>
</html>
